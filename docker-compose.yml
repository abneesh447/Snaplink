version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: url_shortener_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:alpine
    container_name: url_shortener_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: url_shortener_server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=mongodb://mongodb:27017/url-shortener
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=http://localhost:3000
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
    depends_on:
      - mongodb
      - redis

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
    container_name: url_shortener_client
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  mongo_data:
  redis_data:
